name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  actions: read

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:

  # ============================================
  # COMPILE
  # ============================================
  build:
    name: Build All Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn clean compile -DskipTests --batch-mode --no-transfer-progress

  # ============================================
  # UNIT TESTS (parallel per service)
  # ============================================
  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - account-service
          - transaction-service
          - loan-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn test --batch-mode --no-transfer-progress

      - name: Generate JaCoCo coverage report
        if: >
          matrix.service == 'user-service' ||
          matrix.service == 'account-service' ||
          matrix.service == 'transaction-service'
        run: |
          cd ${{ matrix.service }}
          mvn jacoco:report --batch-mode --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        if: >
          always() && (
          matrix.service == 'user-service' ||
          matrix.service == 'account-service' ||
          matrix.service == 'transaction-service')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          retention-days: 7

  # ============================================
  # INTEGRATION TESTS (Testcontainers)
  # ============================================
  integration-tests:
    name: Integration Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: unit-tests

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - account-service
          - transaction-service
          - loan-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run integration tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn failsafe:integration-test failsafe:verify --batch-mode --no-transfer-progress

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/failsafe-reports/
          retention-days: 7
