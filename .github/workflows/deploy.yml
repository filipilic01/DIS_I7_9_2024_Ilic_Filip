name: Deploy

on:
  workflow_run:
    workflows: [ "Docker Publish" ]
    branches: [ main, develop ]
    types: [ completed ]

permissions:
  contents: write
  actions: read

env:
  DOCKERHUB_REPO: banking

jobs:

  # ============================================
  # DEPLOY TO DEVELOPMENT (develop branch)
  # ============================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    environment:
      name: development
      url: http://dev.banking.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Development
        run: |
          echo "Deploying to Development..."
          echo "Image tag: ${{ github.event.workflow_run.head_sha }}"
          echo "Command: docker-compose pull && docker-compose up -d"
          echo "Development deployment completed!"

  # ============================================
  # DEPLOY TO STAGING (main branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment:
      name: staging
      url: http://staging.banking.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging..."
          echo "Image tag: ${{ github.event.workflow_run.head_sha }}"
          echo "Command: kubectl set image deployment/... --namespace=staging"
          echo "Staging deployment completed!"

  # ============================================
  # DEPLOY TO PRODUCTION (manual approval)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment:
      name: production
      url: http://banking.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Production
        run: |
          echo "Deploying to Production..."
          echo "Image tag: ${{ github.event.workflow_run.head_sha }}"
          echo "Command: kubectl set image deployment/... --namespace=production"
          echo "Production deployment completed!"

      - name: Create Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ github.run_number }} -m "Release v${{ github.run_number }} - ${{ github.event.workflow_run.head_sha }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git v${{ github.run_number }}
