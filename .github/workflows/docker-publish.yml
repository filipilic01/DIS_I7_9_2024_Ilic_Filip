name: Docker Publish

on:
  workflow_run:
    workflows: [ "Build and Test" ]
    branches: [ main ]
    types: [ completed ]

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m
  DOCKERHUB_REPO: banking

jobs:

  # ============================================
  # BUILD AND PUSH DOCKER IMAGES (parallel)
  # ============================================
  docker-build-push:
    name: Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - account-service
          - transaction-service
          - loan-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
