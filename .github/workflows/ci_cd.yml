name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  packages: write
  actions: read

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m
  DOCKERHUB_REPO: banking

jobs:

  # ============================================
  # BUILD - Compile all services
  # ============================================
  build:
    name: Build All Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn clean compile -DskipTests --batch-mode --no-transfer-progress

  # ============================================
  # TEST - Unit tests per service (parallel)
  # ============================================
  test:
    name: Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - account-service
          - transaction-service
          - loan-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn test --batch-mode --no-transfer-progress

      - name: Generate JaCoCo coverage report
        if: >
          matrix.service == 'user-service' ||
          matrix.service == 'account-service' ||
          matrix.service == 'transaction-service'
        run: |
          cd ${{ matrix.service }}
          mvn jacoco:report --batch-mode --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        if: >
          always() && (
          matrix.service == 'user-service' ||
          matrix.service == 'account-service' ||
          matrix.service == 'transaction-service')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          retention-days: 7

  # ============================================
  # INTEGRATION TEST - Testcontainers (Docker)
  # ============================================
  integration-test:
    name: Integration Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - account-service
          - transaction-service
          - loan-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run integration tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn failsafe:integration-test failsafe:verify --batch-mode --no-transfer-progress

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/failsafe-reports/
          retention-days: 7

  # ============================================
  # PACKAGE - Build and push Docker images
  # ============================================
  package:
    name: Docker Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - account-service
          - transaction-service
          - loan-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ============================================
  # DEPLOY TO DEVELOPMENT (develop branch)
  # ============================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: http://dev.banking.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Development
        run: |
          echo "Deploying to Development..."
          echo "Images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}-*:${{ github.sha }}"
          echo "Command: docker-compose pull && docker-compose up -d"
          echo "Development deployment completed!"

  # ============================================
  # DEPLOY TO STAGING (main branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: http://staging.banking.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging..."
          echo "Images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}-*:${{ github.sha }}"
          echo "Command: kubectl set image deployment/... --namespace=staging"
          echo "Staging deployment completed!"

  # ============================================
  # DEPLOY TO PRODUCTION (manual approval)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://banking.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Production
        run: |
          echo "Deploying to Production..."
          echo "Images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}-*:${{ github.sha }}"
          echo "Command: kubectl set image deployment/... --namespace=production"
          echo "Production deployment completed!"

      - name: Create Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v${{ github.run_number }} -m "Release v${{ github.run_number }} - ${{ github.sha }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git v${{ github.run_number }}
